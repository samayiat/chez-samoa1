"use strict";
/* ============================================================================
   CULINARY DASH  —  build 2026-07-13
   Self-contained HTML5 cooking/time-management game (gift build). Runs in-chat.

   ARCHITECTURE MAP
     DATA (top)   : DISHES, STATIONS, CAST, layout consts — data-driven tables.
     RENDER       : logical 320x180 supersampled up to 6x (crisp text);
                    forced landscape via CSS rotate. loop: update(dt) ->
                    draw() [world, shake] -> drawUI() [HUD/controls, steady].
     SPRITES      : CHARS (base64) -> CHAR_IMG. drawChar(id,dir,x,feetY,scale,
                    frame) is bottom-center anchored. Chef data is nested
                    {dir:{idle,walk1,walk2}}; customers are flat {dir:dataURI}.
                    DMAP maps chef facing -> sprite key. Extraction bakes a thin
                    black outline; frames are facing-auto-corrected at build time.
     SYSTEMS      : seating + 3-seat waiting bench (auto-promote), wave-off,
                    sound (procedural Web-Audio, sfx()), particles + screen-shake,
                    last-call clock.

   CONVENTIONS
     - Comment code as it's written. Behavior changes are batched from a manifest.
     - Tunables live near the top of their section (CHEF_SCALE, drain rates, etc.).

   DOCS / ROADMAP : see culinary-dash-docs/ (CHANGELOG, ROADMAP, DECISIONS, PARKED).
   ============================================================================ */
const CV = document.getElementById("c"), X = CV.getContext("2d");
X.imageSmoothingEnabled = false;
const W = 320, H = 180;

/* ---------- force landscape: rotate canvas only on a real touch device ----------
   A phone held upright rotates 90° so the game fills the screen sideways. A desktop must
   LETTERBOX, never rotate — even when its window is taller than wide, which is exactly
   Claude Code Desktop's docked preview pane (narrow, beside the chat). Keying rotation off
   aspect ratio alone spun the whole game sideways there. So gate it on an actual touch
   device (coarse pointer / touch events), mirroring the (pointer:fine) idiom keyboardControls
   uses below. wantRotate is pure so the harness can pin the decision without a DOM. */
function wantRotate(vw, vh, touch){ return !!touch && vh > vw; }
let scale=1, vw=0, vh=0, portrait=false, cw=0, ch=0, SS=1;
function computeLayout(){
  vw = window.innerWidth; vh = window.innerHeight;
  const touch = !!(window.matchMedia && window.matchMedia("(pointer:coarse)").matches) || ("ontouchstart" in window);
  portrait = wantRotate(vw, vh, touch);
  scale = portrait ? Math.min(vw / H, vh / W) : Math.min(vw / W, vh / H);
  cw = W * scale; ch = H * scale;
  CV.style.width = cw + "px";
  CV.style.height = ch + "px";
  CV.style.transform = "translate(-50%,-50%) rotate(" + (portrait ? 90 : 0) + "deg)";
  // supersample the backing buffer: render at up to 6x internally so text is sharp,
  // while the game keeps drawing in 320x180 coordinates and sprites stay crisp.
  const dpr = Math.min(window.devicePixelRatio || 1, 3);
  const want = Math.max(2, Math.min(8, Math.round(scale * dpr)));   // up to 8x internally (sharp on a big Mac screen)
  if(CV.width !== W*want){ CV.width = W*want; CV.height = H*want; SS = want; }
  X.setTransform(SS, 0, 0, SS, 0, 0);   // all drawing stays in logical 320x180 units
  X.imageSmoothingEnabled = false;       // (re)apply after any backing-size change
}
window.addEventListener("resize", computeLayout);
window.addEventListener("orientationchange", ()=>setTimeout(computeLayout,150));
computeLayout();
function mapPointer(clientX, clientY){
  const sx = clientX - vw/2, sy = clientY - vh/2;
  let lx, ly;
  if(portrait){ lx = sy; ly = -sx; }
  else { lx = sx; ly = sy; }
  return { x: (lx + cw/2) / scale, y: (ly + ch/2) / scale };
}

/* ================= palette + chef sprites ================= */

const HAT_L=["...........WWWWW","..........WWWWWW",".........WWWWWW.","........WWWWWWW.",".......WWWWWWW..",".....WWWWWWWWW..","....WWWWWWWWW...","...wwwwwwwwww...","...WWWWWWWWWW..."];
const HAT_S=["..WWWWW.........","..WWWWWW........","..WWWWWWW.......","...WWWWWWW......","...WWWWWWWW.....","...WWWWWWWWW....","...WWWWWWWWWW...","...wwwwwwwwww...","...WWWWWWWWWW..."];
const HD_D=["..HWWWWWWWWWWH..",".HHHSSSSSSSSHHH.","..HHSSSSSSSSHH..","....SKSSSSKS....","....SKSSSSKS....","....sSSSSSSs....",".....SSSSSS....."];
const HD_U=["..HWWWWWWWWWWH..",".HHHHHHHHHHHHHH.","..HHHHHHHHHHHH..","...HHHHHHHHHH...","....HHHHHHHH....","....hHHHHHHh....",".....HHHHHH....."];
const HD_R=["..HWWWWWWWWWW...",".HHHHHSSSSSS....","..HHHSSSSSSS....","...HHSSSSSKS....","...HHSSSSSKS....","....hsSSSSSs....",".....SSSSSS....."];
const TO_D=[".....RRRRRR.....","...WWWWRRWWWW...","..WWWWWRRWWWWW..","..wWWKWWWWKWWw..","..SWWKWWWWKWWS..","....WWWWWWWW....","....WWWWWWWW...."];
const TO_U=[".....WWWWWW.....","...WWWWWWWWWW...","..WWWWWWWWWWWW..","..wWWWWwwWWWWw..","..SWWWWwwWWWWS..","....WWWWWWWW....","....WWWWWWWW...."];
const TO_R=["....RRRRRR......","....WWWWWWWW....","....WWWWWWWW....","....WWWwWWWW....","....WWWsWWWW....","....WWWWWWWW....","....WWWWWWWW...."];
const LF={idle:["....PPPPPPPP....","....PPP..PPP....","....PPP..PPP....","....BBB..BBB....","....BBB..BBB...."],
  A:["....PPPPPPPP....","...PPP...PPP....","...PPP...BBB....","...BBB..........","...BBB.........."],
  B:["....PPPPPPPP....","....PPP...PPP...","....BBB...PPP...","..........BBB...","..........BBB..."]};
const LS={idle:["....PPPPPPPP....",".....PPP.PPP....",".....PPP.PPP....",".....BBB.BBB....",".....BBB.BBB...."],
  A:["....PPPPPPPP....","...PPP....PPP...","...PPP....PPP...","..BBB......BBB..","..BBB......BBB.."],
  B:["....PPPPPPPP....",".....PPPPPP.....",".....PPPPPP.....","......BBBB......","......BBBB......"]};

function padRows(rows){ return rows.map(r=>(r+"................").slice(0,16)); }
function assembleDir(hat, head, torso, legs){
  const out={};
  for(const f of ["idle","A","B"]) out[f]=padRows(hat.concat(head, torso, legs[f]));
  return out;
}
const CHEF = {
  down:  assembleDir(HAT_L, HD_D, TO_D, LF),
  up:    assembleDir(M(HAT_L), HD_U, TO_U, LF),
  right: assembleDir(HAT_S, HD_R, TO_R, LS),
};
CHEF.left = {idle:M(CHEF.right.idle), A:M(CHEF.right.A), B:M(CHEF.right.B)};

function rasterGrid(rows){
  const c=document.createElement("canvas"); c.width=16; c.height=rows.length;
  const g=c.getContext("2d");
  rows.forEach((row,y)=>{for(let i=0;i<16;i++){const col=PAL[row[i]]; if(col){g.fillStyle=col; g.fillRect(i,y,1,1);}}});
  return c;
}
const SPR={};
for(const d of ["down","up","left","right"]){ SPR[d]={}; for(const f of ["idle","A","B"]) SPR[d][f]=rasterGrid(CHEF[d][f]); }

/* ================= world layout: kitchen top, dining bottom ================= */

const PASS  = {x:158,y:90,name:"pass"};

/* ============================ PLANTS ============================
   Greenery lives on the ARCHITECTURE, not on the floor: pots dotted around open floor read as
   obstacles someone left out, not as a room that's been planted. Three families:
     - floor : solid pots, tucked into corners/edges ONLY. Solid = the one kind that can wall off a
               station, so these are few, cornered, and covered by clearance + reachability tests.
     - hang  : baskets on the ceiling, trailing tendrils down over the windows. Not solid (they're
               in the air). These sit against the locale view, which ties the greenery to the sky.
     - vine  : runners climbing the side margins and creeping the bottom edge. Not solid — the side
               margins (x<FLOOR.x0, x>FLOOR.x1) are drawn but unwalkable, so they're free real estate.
   All three are seeded + per-locale, sharing PLANT_PAL. */
const PLANT_R=6;                 // solid radius, floor pots only (tables are TABLE_R=8)
const PLANT_HP=3.2;              // a couple of solid hits

   owns y100..126 and the chef needs the corner, so a third pot there would block the partner's exit. */

const VINE_SPOTS=[               // WALL runners down the unwalkable side margins + the bottom edge
  {x:6,   y:46,  len:38, seed:41}, {x:6,   y:130, len:34, seed:43},

  {x:60,  y:172, len:0,  seed:59, creep:true}, {x:240, y:174, len:0, seed:61, creep:true},
];

resetPlants();
function plantSolid(p){ return !p.broken; }
/* A plant canvas is 22px wide, so its body is ~11px either side of (p.x,p.y-7). SMASH_R is that
   footprint plus a little: a body has to actually clip the thing, not shatter it from across the room.
   Measured at 16 this fired in 3 fights out of 8 (the brawl lives mid-room, the plants line the walls);
   at 20 it is a reliable-but-not-constant bit of collateral. */
const PLANT_SMASH_R=20;
const KB_SMASH_SPEED=26;         // a body moving faster than this takes greenery with it
const KB_SMASH_W=0.22;           // damage per frame while it ploughs through (a few frames = a pot)
/* Plants take damage from the impact spine rather than from enemy AI: impact() already knows a blow
   of weight w landed at (x,y), which is exactly what collateral is. No raid targets, no new states,
   and it can't drift out of sync with the fight because there's nothing to keep in sync. */
function smashPlantsNear(x,y,w){
  if(phase!=="brawl") return;                    // the riot wrecks the room; a lunchtime scuffle doesn't
  for(const p of plants){
    if(p.broken) continue;
    if(Math.hypot(p.x-x, (p.y-7)-y) > PLANT_SMASH_R) continue;   // (p.x,p.y-7) = the plant's body
    p.hp -= w;
    if(p.hp<=0){
      p.broken=true;
      const pal=PLANT_PAL[ENV]||PLANT_PAL[0];
      burst(p.x, p.y-8, 22, pal.leaf.concat([pal.pot||pal.leaf[0]]), {sp:70, up:26, life:0.7});
      sfx("smash");
    }
  }
}

/* FULLSCREEN. Chrome on Android parks its URL bar and the system nav over a canvas game unless asked.
   Two constraints shape this:
     1. requestFullscreen needs USER ACTIVATION, and Chrome does NOT count gamepad input as activation —
        the Gamepad API is polling, there's no event carrying a user gesture. So it rides the first
        TOUCH, the same gesture initAudio() already needs. One tap, then the pad takes over.
     2. It asks ONCE. If she exits fullscreen on purpose, dragging her back in on the next tap would be
        the game arguing with her.
   Landscape lock only after the promise resolves — the spec requires fullscreen first, and on failure
   the whole thing stays a no-op rather than throwing into the input path. */
let fsAsked=false;
function goFullscreen(){
  if(fsAsked) return;
  fsAsked=true;
  const el=document.documentElement;
  const req=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen;
  if(!req || document.fullscreenElement) return;
  try{
    const p=req.call(el);
    if(p && p.then) p.then(()=>{
      try{ if(screen.orientation && screen.orientation.lock) screen.orientation.lock("landscape").catch(()=>{}); }catch(_){}
    }).catch(()=>{});
  }catch(_){}
}
function onDown(e){
  goFullscreen();                                 // first touch only; see above
  for(const p of e.changedTouches ? e.changedTouches : [e]){
    const id = p.identifier!==undefined?p.identifier:"m";
    const L = mapPointer(p.clientX, p.clientY);
    initAudio();                                  // browsers require a gesture to start audio
    if(paused){                                            // PAUSED: toggle rows, or resume
      const inR=r=> r && L.x>=r.x && L.x<=r.x+r.w && L.y>=r.y && L.y<=r.y+r.h;
      if(inR(pauseToggleRect)){ keyboardControls=!keyboardControls; sfx("seat"); return; }
      if(inR(envToggleRect)){ ENV=(ENV+1)%ENVS.length; FLOOR_CV=null; sfx("seat"); return; }   // DEV: next view (rebakes floor light)
      if(DEV){
        // NB: any unhandled tap in here RESUMES the game, so every dev row must return —

    if(L.x < W*0.5){ joy={id,ox:L.x,oy:L.y,vx:0,vy:0,active:true}; }

  if(phase==="over"){ enterOffice(); return; }

  if(phase==="gameover"){ startCampaign(); return; }

  if(phase==="brawl"){ chefPunch(); btnPulse=1; return; }

/* ================= GAMEPAD =================
   The device this ships to is a handheld with dual 3D hall-effect sticks and analog triggers, and it
   reports as a standard-mapped Xbox pad — and the game had ZERO getGamepads calls. It handed you an
   on-screen thumbstick while your thumbs were on real ones.
   Third source into the same `joy`, mirroring the keyboard layer exactly: a pure vector fn, an apply
   at the top of update(), and edge-triggered actions. NOT gated on keyboardControls — that flag means
   "no touchscreen", which is the wrong question entirely for a pad.
   NB B (button 1) is deliberately unmapped: Android routes it to system BACK, and the Gamepad API is
   polling, not events — there is no press to preventDefault. It exits the host app before we see it.
   That's a host problem (needs a fullscreen browser/PWA, see PARKED), not something code can fix. */
const PAD_DEADZONE=0.28;      // hall sticks are precise, but resting drift still reads as input
const PAD_A=0, PAD_X=2, PAD_START=9, PAD_DU=12, PAD_DD=13, PAD_DL=14, PAD_DR=15;
let padPrev=[], padWasMoving=false, padSeen=false;
function padGet(){
  if(typeof navigator==="undefined" || !navigator.getGamepads) return null;
  const ps=navigator.getGamepads ? navigator.getGamepads() : [];
  for(let i=0;i<ps.length;i++) if(ps[i] && ps[i].connected && ps[i].mapping==="standard") return ps[i];
  for(let i=0;i<ps.length;i++) if(ps[i] && ps[i].connected) return ps[i];   // non-standard beats nothing
  return null;
}
// Pure: axes + dpad -> a move vector. Deadzone applied to the MAGNITUDE, not per-axis, or the corners
// get a bigger deadzone than the cardinals and diagonal walking feels sticky.
function padVec(axes, buttons){
  let x=(axes && axes[0])||0, y=(axes && axes[1])||0;
  if(buttons && buttons.length>PAD_DR){
    if(buttons[PAD_DR]) x=1; else if(buttons[PAD_DL]) x=-1;
    if(buttons[PAD_DD]) y=1; else if(buttons[PAD_DU]) y=-1;
  }
  const m=Math.hypot(x,y);
  if(m<PAD_DEADZONE) return {x:0,y:0};
  if(m>1){ x/=m; y/=m; }

}
// Pure: which buttons went down THIS poll (edge, not level).
function padEdges(now, prev){
  const out=[];
  for(let i=0;i<now.length;i++) if(now[i] && !prev[i]) out.push(i);
  return out;
}
function applyPadMove(){
  const p=padGet(); if(!p) return;
  const v=padVec(p.axes, p.buttons.map(b=>b.pressed));
  if(v.x||v.y){ joy.vx=v.x; joy.vy=v.y; padWasMoving=true; }
  else if(padWasMoving){ joy.vx=0; joy.vy=0; padWasMoving=false; }

/* Polled from loop() BEFORE the hitstop check, on purpose: update() is skipped during the held frame,

function pollPad(){
  const p=padGet();

  if(!padSeen){ padSeen=true; initAudio(); }        // first pad activity counts as the audio gesture
  const now=p.buttons.map(b=>b.pressed);
  const down=padEdges(now, padPrev);
  padPrev=now;
  for(const b of down){
    if(b===PAD_START){ if(paused) paused=false; else if(canPause()) paused=true; continue; }
    if(paused) continue;
    if(b===PAD_A) primaryAction();
    else if(b===PAD_X) secondaryAction("pad");
  }
  if(!now[PAD_X] && chugId==="pad") chugRelease();   // release ends the chug, same as touch/key
}
const GAME_KEYS=["KeyW","KeyA","KeyS","KeyD","ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space","KeyJ","KeyK","KeyP","Escape","Enter"];

const CANDLE_DX=5;   // candle sits right of centre, clear of the plate zone (s.x-4..s.x+4)
const TABLE_R=8;                                  // dining tables are solid — the chef slides around them
const PASS_BAR_L=64, PASS_BAR_R=252, PASS_Y0=85, PASS_Y1=96;   // the pass counter is a wall...
const PASS_GAPS=[[108,124],[148,164],[188,204]];  // ...with three openings between the plating slots
const PASS_SEGS=(()=>{ const segs=[]; let x=PASS_BAR_L; for(const [g0,g1] of PASS_GAPS){ if(g0>x) segs.push([x,g0]); x=g1; } if(x<PASS_BAR_R) segs.push([x,PASS_BAR_R]); return segs; })();
function resolveChefCollision(nx,ny){
  for(const s of STOOLS){ const dx=nx-s.x, dy=ny-s.y, d=Math.hypot(dx,dy);   // tables
    if(d<TABLE_R){ if(d>0.01){ nx=s.x+dx/d*TABLE_R; ny=s.y+dy/d*TABLE_R; } else ny=s.y+TABLE_R; } }
  for(const p of plants){ if(!plantSolid(p)) continue;                        // plants (a wreck is walkable)
    const dx=nx-p.x, dy=ny-p.y, d=Math.hypot(dx,dy);
    if(d<PLANT_R){ if(d>0.01){ nx=p.x+dx/d*PLANT_R; ny=p.y+dy/d*PLANT_R; } else ny=p.y+PLANT_R; } }
  for(const [x0,x1] of PASS_SEGS){                                           // pass counter (openings are gaps in this list)
    if(nx>x0 && nx<x1 && ny>PASS_Y0 && ny<PASS_Y1){
      const pl=nx-x0, pr=x1-nx, pt=ny-PASS_Y0, pb=PASS_Y1-ny, m=Math.min(pl,pr,pt,pb);
      if(m===pt) ny=PASS_Y0; else if(m===pb) ny=PASS_Y1; else if(m===pl) nx=x0; else nx=x1;
    }

function saladDone(c){ return assembleDone(c); }
function stationOf(dishId){ const d=DISHES[dishId]; return d && stationById(d.station); }

function recipeOf(dishId){ const d=DISHES[dishId]; if(d && d.recipe) return d.recipe;

function assembleDone(c){ return ingredientsComplete(c) && !!DISHES[c.type] && DISHES[c.type].make==="assemble"; }
function nearestTarget(){
  const cands=[];
  for(const st of STATIONS){
    if(st.kind==="timing"){ cands.push({t:"station",st,x:st.x,y:st.y+4});
      if(st.ingredients) for(const ing of st.ingredients) cands.push({t:"ingredient",st,ing,x:ing.x,y:ing.y+4}); }
    else if(st.kind==="assemble" || st.kind==="source") for(const ing of st.ingredients) cands.push({t:"ingredient",st,ing,x:ing.x,y:ing.y+4});

  for(const c of cands){ if(!contextLabel(c)) continue; const d=dist(chef.x,chef.y,c.x,c.y);

function contextLabel(tgt){

    if(c.state==="badorder") return "wave off";
    if(c.state==="waiting" && stationBrokenFor(c.order.dish)) return "apologize";   // we don't have it

// needs this or every punch sounds like a menu confirm. Decaying white noise -> lowpass -> gain.
function noise(dur,vol,lp,slideTo){
  if(!actx||muted) return;

    const t=actx.currentTime, n=Math.max(1,Math.floor(actx.sampleRate*dur));
    const buf=actx.createBuffer(1,n,actx.sampleRate), d=buf.getChannelData(0);

    iflashes.push({x, y, t:IFLASH_LIFE, w});     // the white-hot pop AT the contact point
    if(iflashes.length>IFLASH_MAX) iflashes.splice(0, iflashes.length-IFLASH_MAX);
    const ang = Math.atan2(dy||0, dx||0);
    burst(x, y, Math.round(SPARK_PER_W*w), ["#fff3c4","#ffd86b","#e0674e","#f7f3ea"],
          {sp:60+90*w, up:10+18*w, life:0.30+0.35*w, ang, spread:1.3, size:1});
    burst(x, y, Math.round(SPARK_PER_W*w*0.4), ["#ffffff","#ffd86b"],
          {sp:130+150*w, up:4, life:0.14+0.14*w, ang, spread:0.5, size:1, grav:10});   // fast leading shards
  }
  return w;
}
// The held frame. Pure-ish + separate from the loop so it's testable (the loop itself never runs headless).
function tickHitstop(dt){
  if(hitstopT<=0) return false;
  hitstopT=Math.max(0, hitstopT-dt);
  return true;                      // frozen this frame: caller skips update(), still renders
}
function tickKick(dt){
  if(!kick.x && !kick.y) return;
  const f=Math.pow(KICK_FRICTION, dt*60); kick.x*=f; kick.y*=f;
  if(Math.abs(kick.x)+Math.abs(kick.y)<0.05){ kick.x=0; kick.y=0; }
}

/* ================= order dialogue ================= */
function openOrder(c){
  const cast=CAST[c.type];
  const line=orderLine(cast,c.order);
  dialogue={ cast, cust:c, text:wrap(line,44), foodId: c.order.kind==="good"?c.order.dish:null };
}
function advanceDialogue(){
  const c=dialogue.cust;
  c.state = c.order.kind==="good" ? "waiting" : "badorder";
  c.orderT = performance.now();   // #6: start the speed-tip clock the moment the order's taken
  notify("taken");
  if(c.order.kind==="bad") badLedger.push(c.type);   // troublemaker logged: they'll be back (Brawl)
  c.hearts = HEARTS_MAX;        // reset patience once you've engaged (same instant as orderT above: ONE clock)
  dialogue=null;
}
function wrap(str,max){
  const words=str.split(" "); const lines=[]; let cur="";
  for(const w of words){
    if((cur+" "+w).trim().length>max){ lines.push(cur.trim()); cur=w; }
    else cur+=" "+w;
  }
  if(cur.trim()) lines.push(cur.trim());
  return lines.slice(0,3);
}

/* ================= wave-off (the shoo) ================= */
function startWaveoff(c){
  const dx=DOOR.x-chef.x, dy=DOOR.y-chef.y, d=Math.hypot(dx,dy)||1;
  chef.dir = Math.abs(dx)>Math.abs(dy) ? (dx>0?"right":"left") : (dy>0?"down":"up");
  waveoff={ t:0, dur:1.1, cust:c, nx:dx/d, ny:dy/d };
  sfx("waveoff");
}
function finishWaveoff(){
  const c=waveoff.cust;
  c.state="leaving"; c.leaveT=0.3; c.shooed=true;
  const coins=3+Math.floor(Math.random()*3);   // a few coins
  tips+=coins; shooed++;
  flash(c.x,c.y-12,"+"+coins,"#ffd86b");
  flash(W/2,60,"shooed!","#8be27a");
  cheer=1.2;   // rest of the room claps + bounces
  waveoff=null;
  sfx("cheer"); sfx("coin"); addShake(1.6);
  // confetti over the seated customers
  for(const o of customers){ if(o.state==="ordering"||o.state==="waiting"||o.state==="badorder")
    burst(o.x,o.y-16,5,["#ffd86b","#8be27a","#c4789a","#5a9ec0"],{sp:26,up:14,life:0.9,grav:44}); }
}

/* ================= customers ================= */
function freeStool(){ return STOOLS.find(s=>!s.taken); }
/* ---- pass theft: food left plated on the pass can get swiped ---- */
const PASS_THEFT_INTERVAL=3.5, PASS_THEFT_CHANCE=0.10, PASS_THEFT_FIGHT=0.35, PASS_THEFT_SPEED=66;
let passThief=null, passTheftT=0;
function theftValue(type){ const d=DISHES[type]; return (d&&d.pts&&d.pts.perfect)||16; }
function maybePassTheft(dt){
  if(passThief) return;
  passTheftT+=dt; if(passTheftT<PASS_THEFT_INTERVAL) return; passTheftT=0;
  const occupied=PASS_SLOTS.filter(s=>s.item); if(!occupied.length) return;
  if(Math.random()>=PASS_THEFT_CHANCE) return;
  const slot=occupied[Math.floor(Math.random()*occupied.length)];
  passThief={ x:DOOR.x, y:DOOR.y, slot, dir:"left", moving:true, carry:null, state:"in",
    spr:(Math.random()<SPRITE_CHANCE&&CUST_SPR.length)?(Math.random()*CUST_SPR.length|0):null };
}
function updatePassThief(dt){
  const t=passThief; if(!t) return;
  const gx = t.state==="in" ? t.slot.x : DOOR.x;
  const gy = t.state==="in" ? t.slot.y+6 : DOOR.y;
  const dx=gx-t.x, dy=gy-t.y, d=Math.hypot(dx,dy)||1; t.dir=dx<0?"left":"right";
  if(d>3){ t.x+=dx/d*PASS_THEFT_SPEED*dt; t.y+=dy/d*PASS_THEFT_SPEED*dt; return; }
  if(t.state==="in"){
    const stolen=t.slot.item; t.slot.item=null; nudgePlates(1);   // someone snatching a plate rattles the stack
    if(stolen){ t.carry=stolen; t.state="flee"; passTheftResolve(stolen); } else passThief=null;   // slot emptied first
  } else passThief=null;   // out the door with the goods
}
function passTheftResolve(stolen){
  const loss=theftValue(stolen.type);
  const fromTips=Math.min(tips, loss); tips-=fromTips; if(run) run.bank=Math.max(0, run.bank-(loss-fromTips));
  combo=0; flash(PASS.x, PASS.y-14, "SWIPED!  \u2212$"+loss, "#c8452e"); sfx("walkout"); addShake(2);
  burst(PASS.x, PASS.y-6, 8, ["#c8452e","#e88a7a"], {sp:30,up:8,life:0.5});
  const victim=customers.find(c=>c.state==="waiting" && c.order && c.order.dish===stolen.type);   // whoever ordered it
  if(victim){
    victim.hearts=Math.max(0, victim.hearts-1);
    flash(victim.x, victim.y-16, "hey, that was mine!", "#e88a7a");
    if(Math.random()<PASS_THEFT_FIGHT && customers.filter(c=>c.state==="squareup").length<SCUFFLE_MAX){
      victim.state="squareup"; victim.hp=SCUFFLE_HP; victim.sqT=SCUFFLE_TIMEOUT; victim.angry=true;
      flash(victim.x, victim.y-14, "SQUARES UP!", "#c8452e"); sfx("burnt"); addShake(1.5);
    }
  }
}
function drawPassThief(){
  const t=passThief; if(!t) return;
  X.fillStyle="rgba(0,0,0,.3)"; X.fillRect(t.x-4,t.y,8,2);
  const set=(t.spr!=null)?CUST_SPR[t.spr]:null, d=set?(set[t.dir]||set.front):null;
  const img=d?(d[Math.floor(performance.now()/150)%2?"w1":"w2"]||d.idle):null;
  if(img && artReady(img)) blitBottom(img, t.x, t.y, CUST_SPR_SCALE);
  else { X.fillStyle="#241c30"; X.fillRect(t.x-4,t.y-13,8,13); X.fillStyle="#caa07a"; X.fillRect(t.x-3,t.y-18,6,6); }  // shady figure
  if(t.carry) drawFoodSmall(t.carry.type, t.x, t.y-19, true, 12);   // making off with the plate
}
function spawnCustomer(){
  const type=Math.floor(Math.random()*CAST.length);
  const cast=CAST[type];
  let order;
  if(Math.random()<0.30){ order={kind:"bad", item:cast.bad}; }
  else { order={kind:"good", dish: MENU[Math.floor(Math.random()*MENU.length)]}; }
  const spr = (Math.random()<SPRITE_CHANCE && CUST_SPR.length) ? (Math.random()*CUST_SPR.length|0) : null;
  const base={x:DOOR.x,y:DOOR.y,type,order,hearts:HEARTS_MAX,bob:Math.random()*6,stool:null,benchSlot:null,spr};
  const s=freeStool();
  if(s){ s.taken=true; customers.push(Object.assign(base,{tx:s.x,ty:s.y,stool:s,dest:"table",state:"entering"})); notify("arrive"); return; }
  const b=freeBench();
  if(b){ b.taken=true; customers.push(Object.assign(base,{tx:b.x,ty:b.y,benchSlot:b,dest:"bench",state:"entering"})); notify("arrive"); return; }
  // no table and no bench room -> they don't come in
}
// pull the longest-waiting benched customer into any freed table
function seatWaiting(){
  for(const s of STOOLS){ if(s.taken) continue;
    const c=customers.find(c=>c.state==="benched");
    if(!c) break;
    s.taken=true; if(c.benchSlot){ c.benchSlot.taken=false; c.benchSlot=null; }
    c.stool=s; c.tx=s.x; c.ty=s.y; c.dest="table"; c.state="entering"; c.hearts=3; sfx("seat");
    // NO notify here: this is seatWaiting() pulling a BENCHED patron to a freed table — they were
    // already in the room. They'll buzz "ready" when they actually sit, which is the actionable moment.
  }
}
function updateCustomers(dt){
  for(const c of customers){
    if(c.state==="entering"){
      const dx=c.tx-c.x, dy=c.ty-c.y, d=Math.hypot(dx,dy);
      c.dir = Math.abs(dx)>Math.abs(dy) ? (dx>0?"right":"left") : (dy>0?"front":"back");
      if(d<1.5){ c.x=c.tx;c.y=c.ty;c.state = c.dest==="bench" ? "benched" : "ordering"; c.dir="front";
        if(c.state==="ordering") notify("ready"); }        // seated and waiting on YOU. Not the bench —
                                                           // benched patrons can't order yet, and a tap
                                                           // that means nothing you can act on is noise.
      else { c.x+=dx/d*60*dt; c.y+=dy/d*60*dt; }
    } else if(c.state==="benched"){
      c.hearts -= 0.05*patienceMult()*dt;   // waiting patience drains slowly (+ Comfy Stools)
      if(c.hearts<=0){ c.hearts=0; c.state="leaving"; c.leaveT=0; c.angry=true;
        lost++; combo=0; flash(c.x,c.y-10,"gave up","#c8452e"); sfx("walkout"); }
    } else if(c.state==="ordering"||c.state==="waiting"||c.state==="badorder"){
      const drain = (c.state==="waiting" ? PATIENCE_DRAIN : (c.state==="badorder"?0.15:0.08))*patienceMult();
      c.hearts -= drain*dt;
      if(c.hearts<=0){ c.hearts=0;
        const scuffling = customers.filter(x=>x.state==="squareup").length;
        if(c.state==="badorder" && Math.random()<SCUFFLE_CHANCE && scuffling<SCUFFLE_MAX){   // P4: the troublemaker squares up
          c.state="squareup"; c.hp=SCUFFLE_HP; c.sqT=SCUFFLE_TIMEOUT; c.angry=true;
          flash(c.x,c.y-14,"SQUARES UP!","#c8452e"); sfx("burnt"); addShake(1.5);
        } else { c.state="leaving"; c.leaveT=0; c.angry=true; lost++; combo=0; flash(c.x,c.y-10,"walked out","#c8452e"); sfx("walkout"); }
      }
    } else if(c.state==="squareup"){                     // P4: stands there, fists up — knock them out or they storm off
      c.sqT-=dt; c.dir = chef.x<c.x?"left":"right";
      if(c.sqT<=0){ c.state="leaving"; c.leaveT=0; c.angry=true; lost++; combo=0; flash(c.x,c.y-14,"stormed out","#c8452e"); sfx("walkout"); }
    } else if(c.state==="eating"){
      c.eatT-=dt;
      if(c.eatT<=0){ c.state="leaving"; c.leaveT=0; }
    } else if(c.state==="leaving"){
      c.leaveT-=dt;
      const dx=DOOR.x-c.x, dy=DOOR.y-c.y, d=Math.hypot(dx,dy);
      c.dir = Math.abs(dx)>Math.abs(dy) ? (dx>0?"right":"left") : (dy>0?"front":"back");
      if(c.leaveT<=0){
        const step=70*dt;
        if(d<=step+1){ if(c.stool)c.stool.taken=false; if(c.benchSlot)c.benchSlot.taken=false; c.dead=true; }
        else { c.x+=dx/d*step; c.y+=dy/d*step; }
      }
    }
  }
  customers=customers.filter(c=>!c.dead);
  seatWaiting();
}

/* ================= update ================= */
function update(dt){
  applyKeyboardMove();                          // WASD -> joystick vector (keyboard mode)
  applyPadMove();                               // ...and the gamepad, last, so a live stick wins
  updateCats(dt);                               // ticks in EVERY phase: update() returns early for
                                                // brawl/night, and bolting is the one thing she must
                                                // still do when the room goes to hell
  if(plateWob>0) plateWob=Math.max(0, plateWob-dt*1.7);   // stack settles after a knock
  tickCamLean(dt);            // in update() (not the loop) so HITSTOP freezes the camera with the sim:
                              // the held frame is the whole point, a camera that drifts through it
                              // un-holds it. Also resets to centre outside a brawl.
  if(phase==="brawl"){ updateBrawl(dt); return; }
  if(phase==="night"){ updateNight(dt); return; }
  if(phase==="boss"){ updateBoss(dt); return; }
  if(phase!=="play") return;
  if(dialogue){ for(const f of flashes){f.t-=dt;} flashes=flashes.filter(f=>f.t>0); return; } // world paused while reading

  if(waveoff){
    waveoff.t+=dt;
    if(waveoff.t>=waveoff.dur) finishWaveoff();
  } else {
    const sp=90;   // #2: brisker fetch/carry (was 74) — the walking loop is the point, just faster
    let vx=joy.vx, vy=joy.vy;
    if(vx||vy){
      let nx=Math.max(FLOOR.x0,Math.min(FLOOR.x1,chef.x+vx*sp*dt));
      let ny=Math.max(FLOOR.y0,Math.min(FLOOR.y1,chef.y+vy*sp*dt));
      const r=resolveChefCollision(nx,ny); chef.x=r.x; chef.y=r.y;   // slide around the tables
      chef.moving=true;
      chef.dir = Math.abs(vx)>Math.abs(vy) ? (vx>0?"right":"left") : (vy>0?"down":"up");
    } else chef.moving=false;
  }

  for(const st of STATIONS) if(st.kind==="timing"){
    if(st.state==="cooking"){ st.t+=dt; if(st.t>=st.cook){st.state="ready";st.t=0;} }
    else if(st.state==="ready"){ st.t+=dt; if(st.t>=st.green){st.state="burnt";st.t=0;} }
    else if(st.state==="burnt"){ st.t+=dt; if(st.t>=COOK_BURN_HOLD){st.state="idle";st.t=0;} }
  }

  updateCustomers(dt);
  maybePassTheft(dt); updatePassThief(dt);   // food left on the pass can get swiped
  updateOfficeIntro(dt);                     // morning: the partner heads into the office
  updateParticles(dt);
  if(shake>0) shake=Math.max(0, shake-dt*SHAKE_DECAY);
  const cap=STOOLS.length+BENCH_SLOTS.length;
  spawnT-=dt; if(dayT>0 && spawnT<=0 && customers.filter(c=>c.state!=="leaving").length<cap){
    spawnCustomer(); spawnT = 4.5 + Math.random()*3.5;
  }
  if(comboTimer>0){comboTimer-=dt; if(comboTimer<=0)combo=0;}
  if(cheer>0) cheer-=dt;
  for(const f of flashes){f.t-=dt; f.y-=14*dt;} flashes=flashes.filter(f=>f.t>0);
  for(const f of iflashes) f.t-=dt; iflashes=iflashes.filter(f=>f.t>0);   // impact pops: no drift, they mark a SPOT
  if(dayT>0){ dayT-=dt; if(dayT<0) dayT=0; }
  else if(customers.length===0){                       // store empty: day truly over
    if(Math.random()<brawlChance()){ startBrawl(); return; }   // P4: the after-close brawl (Beli-gated); bad orders still decide WHO returns
    if(isNightDay()){ startNight(); } else { finishDay(); }  // after-hours only runs Thu–Sun
    return;
  }
  btnPulse=Math.max(0,btnPulse-dt*3);
}

        if(e.role==="thief"){ e.state="steal"; e.target=stealSpot(e); }
        else if(e.aggro){ e.state="chase"; }
        else { e.state="raid"; assignTarget(e); }
      } continue;
    }

    // THIEVES: grab a food blob, then speed-walk for the door (they don't fight)
    if(e.role==="thief"){
      if(e.state==="steal"){
        const t=e.target||{x:chef.x,y:chef.y};
        const dx=t.x-e.x, dy=t.y-e.y, d=Math.hypot(dx,dy)||1; e.dir=dx<0?"left":"right";
        if(d>9){ e.x+=dx/d*ENEMY_SPEED*dt; e.y+=dy/d*ENEMY_SPEED*dt; }
        else { e.carry=true; e.state="flee"; flash(e.x,e.y-16,"GRABBED!","#ffd86b"); }
      } else if(e.state==="flee"){
        const dx=DOOR.x-e.x, dy=DOOR.y-e.y, d=Math.hypot(dx,dy)||1; e.dir=dx<0?"left":"right";
        e.x+=dx/d*THIEF_SPEED*dt; e.y+=dy/d*THIEF_SPEED*dt;
        if(d<10){                                   // out the door
          if(e.carry){ let amt=STEAL_LOSS; const fromTips=Math.min(tips,amt); tips-=fromTips; amt-=fromTips;
            if(run && amt>0) run.bank=Math.max(0,run.bank-amt);
            flash(DOOR.x,DOOR.y-10,"-$"+STEAL_LOSS+" STOLEN","#c8452e"); addShake(1.5); }
          e.state="ko"; e.t=0;
        }
      }
      continue;
    }

    // chef right next to them -> turn and swing
    if((e.state==="raid"||e.state==="smash") && cd<14){ e.state="windup"; e.t=0.28; }

    if(e.state==="raid"){
      if(!e.target || (e.target.kind==="station"&&e.target.ref.broken)) assignTarget(e);
      const t=e.target;
      if(!t){ e.state="chase"; }
      else {
        const dx=t.x-e.x, dy=t.y-e.y, d=Math.hypot(dx,dy)||1;
        e.dir = dx<0?"left":"right";
        if(d>10){ e.x+=dx/d*espd(e)*dt; e.y+=dy/d*espd(e)*dt; }
        else if(smashing<MAX_RAIDERS){ e.state="smash"; e.raidT=0; smashing++; raiders++; }  // spot open
        else { e.state="chase"; }                    // stations are full -> go after the chef
      }
    } else if(e.state==="smash"){
      raiders++;
      const t=e.target;
      if(!t || (t.kind==="station"&&t.ref.broken)){ e.state="raid"; assignTarget(e); }
      else if(t.kind==="bar"){                        // THE WHISKEY BOTTLE
        if(BAR.broken){ e.state=e.aggro?"chase":"raid"; if(!e.aggro) assignTarget(e); }   // nothing left to drink
        else if(e.buffed){                            // already lit -> now they wreck the bar (kills chef's heal)
          e.raidT+=dt;
          if(e.raidT>=0.6){ e.raidT=0; BAR.hp=(BAR.hp||STATION_HP)-1;
            burst(t.x+(Math.random()*8-4),t.y-2,3,["#c8452e","#7a4e2e"],{sp:24,up:6,life:0.3}); addShake(0.5);
            if(BAR.hp<=0){ BAR.broken=true; sfx("burnt"); addShake(2.6);
              flash(BAR.x,BAR.y+14,"BAR WRECKED","#c8452e");
              burst(BAR.x,BAR.y+8,14,["#c8452e","#7a4e2e","#f7f3ea"],{sp:44,up:14,life:0.7});
              e.state=e.aggro?"chase":"raid"; if(!e.aggro) assignTarget(e); } }
        } else {                                       // CHUGGING — takes as long as cooking a meal
          e.raidT+=dt;
          if(Math.floor(e.raidT*4)%2===0) burst(t.x+(Math.random()*6-3),t.y-2,1,["#e0674e"],{sp:12,up:5,life:0.3});
          if(e.raidT>=DRINK_TIME){ e.buffed=true; e.hp=Math.min(e.hp+2,ENEMY_HP+2); sfx("cheer");
            flash(e.x,e.y-14,"CHUGGED","#e0674e"); e.state=e.aggro?"chase":"raid"; if(!e.aggro) assignTarget(e); }
        }
      } else {                                        // SMASHING a station — chip its HP
        e.raidT+=dt;
        if(e.raidT>=0.6){ e.raidT=0; t.ref.hp=(t.ref.hp||STATION_HP)-1;
          burst(t.x+(Math.random()*8-4),t.y-4,3,["#c8452e","#7a4e2e"],{sp:24,up:6,life:0.3}); addShake(0.5);
          if(t.ref.hp<=0){ t.ref.broken=true; sfx("burnt"); addShake(2.2);
            flash(t.x,t.y-10,"WRECKED","#c8452e");
            burst(t.x,t.y-6,10,["#c8452e","#7a4e2e","#f7f3ea"],{sp:40,up:12,life:0.6});
            e.state=e.aggro?"chase":"raid"; if(!e.aggro) assignTarget(e);
          }
        }
      }
    } else if(e.state==="chase"){                    // hunt the chef — but loosely, with wander
      e.wanderT-=dt;
      if(e.wanderT<=0){ e.wanderT=0.5+Math.random()*0.9;   // re-pick a loose heading now and then
        const jitter=(Math.random()-0.5)*1.4;              // ± up to ~80° off straight-at-you
        const ang=Math.atan2(cdy,cdx)+jitter;
        e.wx=Math.cos(ang); e.wy=Math.sin(ang);
      }
      // separation: drift away from whoever's right on top of them (anti-bunching)
      let sx=0,sy=0;
      for(const o of B.enemies){ if(o===e||o.state==="ko") continue;
        const ox=e.x-o.x, oy=e.y-o.y, od=Math.hypot(ox,oy);
        if(od>0.1 && od<12){ sx+=ox/od; sy+=oy/od; } }
      let mx=e.wx+sx*0.9, my=e.wy+sy*0.9; const ml=Math.hypot(mx,my)||1;
      e.x+=mx/ml*espd(e)*dt; e.y+=my/ml*espd(e)*dt;
      e.dir=cdx<0?"left":"right";
      if(cd<ATK_RANGE){ e.state="windup"; e.t=ATK_WINDUP; }   // in range -> telegraph an attack
    } else if(e.state==="windup"){
      e.dir=cdx<0?"left":"right";
      e.t-=dt; e.flash=0.1;                              // held red flash = the tell
      if(e.t<=0){ e.state="lunge"; e.t=0.16; e.lx=cdx/cd; e.ly=cdy/cd; sfx("waveoff"); }
    } else if(e.state==="lunge"){
      const preD=Math.hypot(chef.x-e.x,chef.y-e.y);
      e.t-=dt; e.x+=e.lx*160*dt; e.y+=e.ly*160*dt;      // dash forward to strike
      const postD=Math.hypot(chef.x-e.x,chef.y-e.y);
      if((preD<13||postD<13) && B.inv<=0){
        const hitDmg=Math.max(1,Math.round(ATK_DAMAGE*(e.buffed?BUFF_EDMG:1)*(B.mobBuff?MOB_DMG:1)*(e.riot?RIOT_EDMG:1)));
        B.chefHP-=hitDmg; B.inv=0.9; B.hurtFlash=0.5;
        brawl.chain=0; brawl.chainT=0;                // taking one breaks your rhythm
        const kx=(e.lx||Math.sign(chef.x-e.x)||1), ky=(e.ly||0);
        if(e.riot){                                   // Phase D: a big-red connects -> the chef stumbles
          B.stumbleT=STUMBLE_TIME; B.stumbleVx=kx*STUMBLE_KB; B.stumbleVy=ky*STUMBLE_KB;
          impact(HIT.stumble, kx, ky, chef.x, chef.y-12); flash(chef.x,chef.y-24,"STUMBLE!","#e88a7a"); }
        else impact(HIT.hurt, kx, ky, chef.x, chef.y-12);
        sfx("hurt");                                  // was sfx("burnt") — the BURNT FOOD sound, in her face
        burst(chef.x,chef.y-14,10,["#c8452e","#f7f3ea"],{sp:40,up:12,life:0.5});
        e.state=e.aggro?"chase":"raid"; if(!e.aggro) assignTarget(e);   // stay on their job
        if(B.chefHP<=0){ chefKO(); return; }
      }
      else if(e.t<=0){ e.state=e.aggro?"chase":"raid"; if(!e.aggro) assignTarget(e); }
    }
  }
  brawl._raiders=raiders;
  B.enemies=B.enemies.filter(e=>!(e.state==="ko"&&e.t<=0));
  if(alive===0){                                    // current wave cleared
    if(brawl.wave<waveCount()){ spawnWave(); }       // send the next one in
    else { brawlWin("cleared"); return; }
  }
  B.t-=dt;
  if(B.t<=0){ brawlWin("survived"); return; }
  updateParticles(dt);
  if(shake>0) shake=Math.max(0,shake-dt*SHAKE_DECAY);
  for(const f of flashes){f.t-=dt; f.y-=14*dt;} flashes=flashes.filter(f=>f.t>0);
  for(const f of iflashes) f.t-=dt; iflashes=iflashes.filter(f=>f.t>0);   // impact pops: no drift, they mark a SPOT
}
function brawlWin(how){
  brawl.outcome=how; brawl.endT=1.6;
  flash(W/2,70, how==="cleared"?"CLEARED OUT!":"CLOSING TIME — THEY SCATTER","#8be27a");
  sfx("perfect"); cheer=1.2;
  { const a=fightAudience();                          // filmed WIN -> reputation rises (faster + more cameras = more)
    const frac=Math.max(0,brawl.t)/BRAWL_TIME, timeK = how==="cleared" ? (0.6+1.4*frac) : 0.6;
    const bonus = Math.round(BELI_WIN_BASE*timeK*a.tier*a.cams*10)/10;
    if(bonus>=0.1){ beliAdj += bonus; brawl.beliDelta = bonus;
      flash(W/2,84, (a.label?a.label+"  ":"")+"+"+bonus.toFixed(1)+" BELI", "#ffd86b"); } }
}
function chefKO(){
  brawl.outcome="ko"; brawl.endT=2.2;
  // half the stations get wrecked (tunable #2: random)
  const pool=STATIONS.slice(); const nDestroy=Math.ceil(pool.length/2);
  for(let i=0;i<nDestroy;i++){ const k=Math.floor(Math.random()*pool.length);
    pool.splice(k,1)[0].broken=true; }
  flash(W/2,70,"KNOCKED OUT","#c8452e"); sfx("burnt"); addShake(4);
  { const a=fightAudience();                          // filmed LOSS -> reputation falls (worse the more people saw)
    let hit = BELI_LOSS_BASE*a.tier*a.cams;
    if(reputation()>=8.5) hit*=1.4;                   // a nicer place has further to fall
    hit=Math.round(hit*10)/10;
    if(hit>=0.1){ beliAdj -= hit; brawl.beliDelta = -hit;
      flash(W/2,84, (a.label?a.label+"  ":"")+"\u2212"+hit.toFixed(1)+" BELI", "#c8452e"); } }
}
function drawBrawl(){
  const B=brawl;
  // drink zone at the bar (shows where to stand to chug)
  if(!BAR.broken){
    const inzone=atBar(); const zy=BAR.y+14;
    X.strokeStyle= inzone?"rgba(224,103,78,.8)":"rgba(224,103,78,.3)"; X.lineWidth= inzone?1.5:1;
    X.beginPath(); X.ellipse(BAR.x, zy+10, BAR_RADIUS*0.82, BAR_RADIUS*0.5, 0, 0, 7); X.stroke(); X.lineWidth=1;
    if(inzone && !B.drinking){ X.fillStyle="rgba(224,103,78,.9)"; X.font="6px monospace"; X.textAlign="center";
      X.fillText("BAR", BAR.x, zy-4); X.textAlign="left"; }
  }
  // station health bars (only show while damaged, not yet wrecked)
  for(const st of STATIONS){
    if(st.broken || st.hp===undefined || st.hp>=STATION_HP) continue;
    const bx = st.kind==="assemble" ? (st.ingredients[0].x+st.ingredients[st.ingredients.length-1].x)/2 : st.x;
    const w=18, frac=Math.max(0,st.hp)/STATION_HP;
    X.fillStyle="#1b1626"; X.fillRect(bx-w/2, st.y-16, w,3);
    X.fillStyle= frac>0.5?"#8be27a":frac>0.25?"#ffd86b":"#c8452e";
    X.fillRect(bx-w/2, st.y-16, Math.round(w*frac),3);
  }
  // enemies (y-sorted with chef)
  const items=[];
  for(const e of B.enemies){
    items.push({y:e.y,f:()=>{
      X.fillStyle="rgba(0,0,0,.35)"; X.fillRect(e.x-6,e.y-1,12,2);
      const set=ENEMY_IMG[e.cast];
      // Real generated shadow art (Addendum 01 + evil-shadow-enemy pass): ENEMY_TEX[cast] = idle
      // {right,left} + one punch move's frames ("cross" — attacking uses ONE punch, no combo, per spec).
      // Populated via docs/tools/ingest once the shadow-state batch lands; a missing cast/dir/frame falls
      // straight through to the legacy ENEMY_IMG art below — this only substitutes WHICH BASE IMAGE is
      // drawn, so windup telegraph, wob, rage aura, KO fade and the RAGE tint itself all still apply to
      // real shadow art exactly as they did to the old masked art (see the tint+draw call further down).
      const etex=ENEMY_TEX[e.cast];
      let key = e.dir==="left"?"left":"right";
      const attacking = e.state==="lunge"||e.state==="windup"||e.state==="smash";
      if(attacking) key = e.dir==="left"?"punchLeft":"punchRight";
      const punchArr = attacking && etex && etex.punch && etex.punch[e.dir==="left"?"left":"right"];
      const shadowIm = punchArr ? punchArr[fightFrameIndex(punchArr.length, enemyPunchElapsed(e))]
                                 : (etex && etex.idle && etex.idle[e.dir==="left"?"left":"right"]);
      const baseIm = (shadowIm && artReady(shadowIm)) ? shadowIm : (set && set[key]);
      // WINDUP telegraph: pulsing red ring under them + rear-back + "!" so the strike is readable
      let wob=0;
      if(e.state==="windup"){
        const pulse=0.5+0.5*Math.sin(performance.now()/40);
        X.fillStyle="rgba(200,45,40,"+(0.35+0.4*pulse)+")";
        X.beginPath(); X.ellipse(e.x,e.y,10+pulse*3,4+pulse,0,0,7); X.fill();
        wob = -Math.round(pulse*2) * (e.dir==="left"?1:-1);   // lean back away from the chef
      } else if(e.state==="smash"){ wob=Math.round(Math.sin(performance.now()/28)*1); }
      const msc = e.riot?RIOT_SIZE:(B.mobBuff?MOB_SIZE:1);   // big-reds are always oversized; GOING LIVE bumps the rest   // GOING LIVE: mob renders +20% bigger
      if(e.rage){ const p=0.5+0.5*Math.sin(performance.now()/60);   // deep red rage aura
        X.fillStyle="rgba(200,45,40,"+(0.2+0.18*p)+")"; X.beginPath(); X.arc(e.x,e.y-10*msc,11*msc,0,7); X.fill(); }
      else if(e.buffed){ X.fillStyle="rgba(200,69,46,.22)"; X.beginPath(); X.arc(e.x,e.y-9,9,0,7); X.fill(); }
      if(e.state==="ko"){ X.globalAlpha=Math.max(0,e.t/0.9); }
      else if(e.flash>0 && e.state!=="windup"){ X.globalAlpha=0.55; }
      if(e.poly && e.mon){
        const mimg = e.rage ? (tinted(e.mon,"mon"+ENV+"_"+e.seed,"#c8452e")||e.mon) : e.mon;
        drawMonster(mimg, e.x+wob, e.y, 20*msc);
      } else if(baseIm){
        if(e.rage){ const t2=tinted(baseIm, e.cast+"|"+key+(shadowIm?"|shadow":""), "#c8452e");
          if(t2) blitBottom(t2, e.x+wob, e.y, CUST_SCALE*msc); else drawFighter(baseIm, e.x+wob, e.y, CUST_SCALE*msc); }
        else drawFighter(baseIm, e.x+wob, e.y, CUST_SCALE*msc);
      }
      X.globalAlpha=1;
      if(e.carry){                                    // stolen food blob over the thief's head
        X.fillStyle="#caa14a"; X.fillRect(e.x-3,e.y-30,6,4);
        X.fillStyle="#e8c060"; X.fillRect(e.x-3,e.y-30,6,1);
        X.fillStyle="#7a4e2e"; X.fillRect(e.x-2,e.y-27,4,1); }
      if(e.role==="thief" && e.state==="flee"){ X.fillStyle="#ffd86b"; X.font="7px monospace"; X.textAlign="center";
        X.fillText("!", e.x, e.y-34); X.textAlign="left"; }
      if(e.state==="windup"){ X.fillStyle="#ffd86b"; X.font="9px monospace"; X.textAlign="center";
        X.fillText("!", e.x, e.y-32); X.textAlign="left"; }
      if(e.state!=="ko" && e.role!=="thief"){ const pipw=Math.min(3,20/ENEMY_HP);
        for(let i=0;i<ENEMY_HP;i++){ X.fillStyle= i<e.hp?(e.buffed?"#e0674e":"#c8452e"):"#3a2f42";
          X.fillRect(e.x-(ENEMY_HP*pipw)/2+i*pipw, e.y-30, Math.ceil(pipw-1),2); } }
    }});
  }
  for(const sp of B.spectators){ items.push({y:sp.y, f:()=>drawSpectator(sp)}); }   // recording tables
  if(B.partner){ items.push({y:B.partner.y, f:()=>drawPartner()}); }                // P2: the partner in the fray
  items.push({y:chef.y,f:()=>{
    X.fillStyle="rgba(0,0,0,.35)"; X.fillRect(chef.x-7,chef.y-1,14,2);
    if(B.buffT>0){ const p=0.5+0.5*Math.sin(performance.now()/70);   // buffed = red glow
      X.fillStyle="rgba(224,103,78,"+(0.18+0.16*p)+")"; X.beginPath(); X.arc(chef.x,chef.y-11,12,0,7); X.fill(); }
    const dir = chefFightDir();                   // was collapsed to left/right — that buried the art
    drawChefGhosts();                                       // drunk afterimages, under the real chef
    if(B.inv>0 && Math.floor(performance.now()/80)%2) X.globalAlpha=0.45;   // hit i-frames blink
    if(B.punchT>0){
      // getting hit beats your own swing: takingpunch was generated, loaded, and never once played.
      const hurt = B.hurtFlash>0 && hasFightArt(chefSet,"takingpunch",dir);
      const mv   = hurt ? "takingpunch" : (B.move||"jab");
      const fd   = fightDir(chefSet,mv,dir) || dir;
      const cfr  = pickFightFrame(chefSet, mv, fd,
                     punchElapsed(hurt?B.hurtFlash:B.punchT, hurt?HURT_DUR:B.punchDur));
      // the art has no "left": mirror the right-facing frames (drawChar's walk cycle has real left art)
      const mir  = !!cfr && shouldMirror(chefSet,mv,dir);
      // PUNCH_IMG only has left/right (the legacy single-frame fallback); front/back resolve to nothing
      // and drop through to drawChar, which DOES have real 4-dir art. Never a frozen sideways pose.
      if(!drawFighter(cfr||PUNCH_IMG[chefSet][dir], chef.x, chef.y, CHEF_SCALE*(CHEF_H[chefSet]||1), mir))
        drawChar(chefSet, dir, chef.x, chef.y, CHEF_SCALE, "idle");
    } else {
      const wf = chef.moving ? (Math.floor(performance.now()/150)%2?"walk1":"walk2") : "idle";
      drawChar(chefSet, DMAP[chef.dir]||"front", chef.x, chef.y, CHEF_SCALE, wf);
    }
    X.globalAlpha=1;
    if(B.whiffT>0){                                   // a miss used to be a beep and nothing else
      const p=1-(B.whiffT/0.16), s2=B.whiffDir;
      X.strokeStyle="rgba(233,216,184,"+(0.5*(1-p))+")"; X.lineWidth=1;
      X.beginPath(); X.arc(chef.x+s2*7, chef.y-11, 9, -0.9+p*0.5, 0.5+p*0.5); X.stroke();
    }
    if(B.drinkT>0 && B.buffT<=0){                     // chugging meter over the chef
      const w=16, f=Math.min(1,B.drinkT/CHEF_DRINK);
      X.fillStyle="#1b1626"; X.fillRect(chef.x-w/2,chef.y-30,w,3);
      X.fillStyle="#e0674e"; X.fillRect(chef.x-w/2,chef.y-30,Math.round(w*f),3);
    }
  }});
  plantItems(items); catItem(items);                 // greenery and the cat y-sort with everyone
  items.sort((a,b)=>a.y-b.y).forEach(it=>it.f());
  drawParticles();
  drawImpactFlashes();      // the white-hot pop at the contact point, over the sparks
  for(const f of flashes){ X.globalAlpha=Math.max(0,f.t); X.fillStyle=f.col; X.font="8px monospace";
    X.textAlign="center"; X.fillText(f.txt,f.x,f.y); X.textAlign="left"; X.globalAlpha=1; }
}
function drawBrawlHUD(){
  /* THE BRAWL UI IS STRIPPED. In service the HUD earns its bar: money, day, rating, orders — things you
     act on. In a fight it was a black band across the top of a 180px room reporting things you can't act
     on mid-punch. What survives is what you cannot infer: HP ("am I about to die" has no diegetic tell)
     and the GO-LIVE banner, which is an EVENT, not a readout. Wave count, enemies-left, the round timer
     and the drink counter are gone — the locale is already on screen throwing punches; it doesn't need a
     frame around it too. No opaque band: the bar floats on the room. */
  if(brawl.hurtFlash>0){                              // full-screen red edge = you got hit
    const a=Math.min(0.5,brawl.hurtFlash);
    X.fillStyle="rgba(200,40,36,"+a+")";
    X.fillRect(0,0,W,6); X.fillRect(0,H-6,W,6); X.fillRect(0,0,6,H); X.fillRect(W-6,0,6,H);
  }
  X.textBaseline="middle";
  const hbw=44, hbx=6, hbh=4, hby=5, frac=Math.max(0,brawl.chefHP)/CHEF_HP;
  X.globalAlpha=0.9;
  X.fillStyle="rgba(0,0,0,.55)"; X.fillRect(hbx-1,hby-1,hbw+2,hbh+2);
  X.fillStyle= frac>0.5?"#5ec96b":frac>0.25?"#ffd86b":"#e8433a";
  X.fillRect(hbx,hby,Math.round(hbw*frac),hbh);
  if(frac<=0.25 && Math.floor(performance.now()/160)%2){        // about to die: it pulses at you
    X.fillStyle="#fff"; X.fillRect(hbx,hby,Math.round(hbw*frac),hbh); }
  X.globalAlpha=1;
  if(brawl.liveT>0){                                  // GOING LIVE just fired -> banner (an event)
    const a=Math.min(1,brawl.liveT/0.6);
    X.globalAlpha=a; X.fillStyle="#c8452e"; X.fillRect(0,15,W,11);
    X.fillStyle="#fff"; X.font="7px monospace"; X.textAlign="center"; X.textBaseline="middle";
    X.fillText("\u25CF LIVE \u2014 THE MOB IS FEEDING OFF IT", W/2, 21); X.globalAlpha=1;
  }
  X.textAlign="left"; X.textBaseline="alphabetic";
  drawBrawlButtons();
}
// a seated diner who stuck around to film the fight (phone up + blinking REC; LIVE badge if they went live)
function drawSpectator(sp){
  const cast=CAST[sp.type], bx=sp.x, by=sp.y;
  const ty=by+6;                                   // little table in front, matches the dining tables

function drawDancerSprite(d,frames){
  const now=performance.now();
  const hop=Math.abs(Math.sin(now/200 + d.ph));                     // same bob timing as the procedural raver, so a mixed floor reads as one crowd
  const bx=Math.round(d.x), by=Math.round(d.y-hop*2);
  const n=frames.length, fr=frames[Math.floor((now/160 + d.ph*40))%n|0] || frames[0];
  if(!artReady(fr)) return false;
  X.globalAlpha=Math.max(0,Math.min(1,d.alpha));
  X.fillStyle="rgba(0,0,0,.28)"; X.fillRect(d.x-3,d.y,6,2);
  X.drawImage(fr, bx-8, by-16, 16, 16);
  X.globalAlpha=1; return true;
}
function drawDancer(d){                           // Phase A: cheap procedural raver, bobs on the beat
  const frames = d.spr && danceFrames(d.spr);
  if(frames && frames.length && drawDancerSprite(d,frames)) return;   // real cast sprite, once ingested — else fall through
  const now=performance.now();
  const hop=Math.abs(Math.sin(now/200 + d.ph));   // vertical bounce
  const sway=Math.sin(now/300 + d.ph*1.7)*1.5;    // side-to-side
  const bx=Math.round(d.x+sway), by=Math.round(d.y-hop*2);
  const armsUp=(Math.sin(now/260 + d.ph)>0.35);   // hands in the air part of the time
  X.globalAlpha=Math.max(0,Math.min(1,d.alpha));
  X.fillStyle="rgba(0,0,0,.28)"; X.fillRect(d.x-3,d.y,6,2);
  X.fillStyle=d.outfit; X.fillRect(bx-3,by-7,6,7);          // body
  X.fillStyle=d.skin;   X.fillRect(bx-2,by-11,4,4);         // head
  if(armsUp){ X.fillStyle=d.skin; X.fillRect(bx-4,by-9,1,2); X.fillRect(bx+3,by-9,1,2); } // raised arms
  else { X.fillStyle=d.skin; X.fillRect(bx-4,by-6,1,2); X.fillRect(bx+3,by-6,1,2); }
  X.globalAlpha=1;
}
function drawNight(){
  drawNightLights();
  const N=night;
  if(N.barDead){                                               // teeth from the brawl: no bar, no revenue
    X.fillStyle="#c8452e"; X.font="7px monospace"; X.textAlign="center";
    X.fillText("THE BAR'S WRECKED — NO BOTTLES TONIGHT", W/2, 44); X.textAlign="left";
  }
  const items=[];
  for(const d of N.dancers) items.push({y:d.y, f:()=>drawDancer(d)});   // crowd y-sorts with everyone
  for(const r of robbers) items.push({y:r.y, f:()=>drawRobber(r)});     // Phase 3: robbers slip in with the crowd
  for(const g of N.groups) items.push({y:g.y, f:()=>drawGroup(g)});
  items.push({y:chef.y, f:()=>{
    X.fillStyle="rgba(0,0,0,.35)"; X.fillRect(chef.x-7,chef.y-1,14,2);
    const wf = chef.moving ? (Math.floor(performance.now()/150)%2?"walk1":"walk2") : "idle";
    drawChar(chefSet, DMAP[chef.dir]||"front", chef.x, chef.y, CHEF_SCALE, wf);
    if(chef.carry && chef.carry.type==="bottle") drawWhiskeyHeld(chef.x, chef.y-18);
  }});
  plantItems(items); catItem(items);                 // greenery and the cat y-sort with everyone
  items.sort((a,b)=>a.y-b.y).forEach(it=>it.f());
  const tgt=nightPrompt();                                     // context hint on the actionable thing
  if(tgt){ X.strokeStyle="#ffd86b"; X.lineWidth=1; X.strokeRect(Math.round(tgt.x-11),Math.round(tgt.y-13),22,20);
    promptChip(tgt.lab.toUpperCase(), tgt.x, tgt.y-15); }
  if(!chef.carry && !N.barDead && !tgt){                       // nudge the player to the bar
    promptChip("grab a bottle at the bar", BAR.x, BAR.y+20, "#e7b3a0"); }
  drawParticles();
  drawImpactFlashes();      // the white-hot pop at the contact point, over the sparks
  for(const f of flashes){ X.globalAlpha=Math.max(0,f.t); X.fillStyle=f.col; X.font="7px monospace";
    X.textAlign="center"; X.fillText(f.txt,f.x,f.y); X.textAlign="left"; X.globalAlpha=1; }
}

function drawIngredientHeld(id,x,y){
  const spr=ingSprite(id);
  if(spr){ const w=spr.naturalWidth||spr.width, h=spr.naturalHeight||spr.height;
    // Match the procedural items' box: they span y-4..y+1 around the anchor, so bottom sits at y+1.
    X.drawImage(spr, Math.round(x-w/2), y+1-h); return; }
  if(id==="lettuce") drawLettuceHeld(x,y);
  else if(id==="tomato") drawTomatoHeld(x,y);
  else if(id==="whiskey") drawWhiskeyHeld(x,y);
  else if(id==="gin") drawGinHeld(x,y);
  else if(id==="sourmix") drawSourHeld(x,y);
  else if(id==="chicken") drawChickenHeld(x,y);
  else if(id==="rawlobster") drawRawLobHeld(x,y);
}

function drawCarry(){
  const x=chef.x, y=chef.y-30, c=chef.carry;

function heart(x,y,fill){ X.fillStyle=fill?"#e8556c":"#3a2f42";
  X.fillRect(x,y+1,1,2);X.fillRect(x+2,y+1,1,2);X.fillRect(x,y,1,1);X.fillRect(x+2,y,1,1);X.fillRect(x+1,y+2,1,1); }
// lighten (f>0) / darken (f<0) a hex colour
function hairShade(hex,f){
  const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  const t=f>0?255:0, a=Math.abs(f);
  r=Math.round(r+(t-r)*a); g=Math.round(g+(t-g)*a); b=Math.round(b+(t-b)*a);
  return "#"+(0x1000000+(r<<16)+(g<<8)+b).toString(16).slice(1);
}
// 24-bit hair: bold silhouette + shine + shadow + sub-pixel strand lines (only resolve thanks to supersampling)
function drawHair(cast,bx,by){
  const t=by-13, cx=bx;                 // t = top of the head
  const base=cast.hair, hi=hairShade(base,0.4), hi2=hairShade(base,0.7), lo=hairShade(base,-0.45);
  X.lineCap="round";
  const S=(x1,y1,x2,y2,col,w)=>{ X.strokeStyle=col; X.lineWidth=w||0.35; X.beginPath(); X.moveTo(x1,y1); X.lineTo(x2,y2); X.stroke(); };
  switch(cast.do){
    case "flattop":
      X.fillStyle=base; X.fillRect(cx-3,t-2,6,3); X.fillRect(cx-3,t+1,1,2); X.fillRect(cx+2,t+1,1,2);
      X.fillStyle=lo; X.fillRect(cx-3,t,6,1);
      X.fillStyle=hi; X.fillRect(cx-2,t-2,3,1); X.fillStyle=hi2; X.fillRect(cx-1,t-2,1,1);
      for(let i=0;i<3;i++) S(cx-2+i*2,t-2,cx-2+i*2,t-0.4,hi,0.3);
      break;
    case "long":
      X.fillStyle=base; X.fillRect(cx-3,t-2,6,2); X.fillRect(cx-4,t,1,9); X.fillRect(cx+3,t,1,9);
      X.fillRect(cx-4,t+7,2,2); X.fillRect(cx+2,t+7,2,2);
      X.fillStyle=lo; X.fillRect(cx-4,t+2,1,6); X.fillRect(cx+3,t+2,1,6);
      S(cx,t-2,cx,t+1,hi,0.3); S(cx-3.5,t,cx-3.5,t+8,hi,0.3); S(cx+3.5,t+1,cx+3.5,t+7,hi2,0.25);
      break;
    case "slick":
      X.fillStyle=base; X.fillRect(cx-3,t-1,6,3); X.fillRect(cx-3,t-2,4,1); X.fillRect(cx-2,t-3,3,1);
      X.fillStyle=lo; X.fillRect(cx-3,t+1,6,1);
      S(cx-2,t-2.5,cx+2,t-0.5,hi,0.35); S(cx-1,t-1,cx+2,t-2.5,lo,0.3);
      break;
    case "cap":
      X.fillStyle=base; X.fillRect(cx-3,t+2,1,2); X.fillRect(cx+2,t+2,1,2); X.fillRect(cx-3,t+3,6,1);
      break;
    case "combover":
      X.fillStyle=base; X.fillRect(cx-3,t+1,1,3); X.fillRect(cx+2,t+1,1,3); X.fillRect(cx-3,t+3,6,1);
      for(let i=0;i<4;i++) S(cx-3,t+i*0.7,cx+3,t-0.4+i*0.7,hi,0.28);
      break;
    case "bun":
      X.fillStyle=base; X.fillRect(cx-3,t-1,6,3);
      X.fillStyle=base; X.fillRect(cx-1,t-4,3,3); X.fillRect(cx-2,t-3,5,1);
      X.fillStyle=lo; X.fillRect(cx-1,t-1,3,1);
      X.fillStyle=hi; X.fillRect(cx,t-4,1,1); X.fillStyle=hi2; X.fillRect(cx,t-4,1,1);
      S(cx-2,t,cx-0.5,t-3,hi,0.3); S(cx+2,t,cx+0.5,t-3,hi,0.3);
      break;
    case "afro":
      X.fillStyle=base; X.fillRect(cx-4,t-3,8,5); X.fillRect(cx-3,t-4,6,1); X.fillRect(cx-4,t+1,1,2); X.fillRect(cx+3,t+1,1,2);
      X.fillStyle=lo; X.fillRect(cx-4,t+1,8,1);
      X.fillStyle=hi; X.fillRect(cx-3,t-3,2,1); X.fillStyle=hi2; X.fillRect(cx-3,t-3,1,1);
      for(let i=0;i<5;i++){ const ax=cx-3+i*1.6, ay=t-2+((i%2)?1:0); S(ax,ay,ax+0.8,ay+0.8,lo,0.28); }
      break;
    case "sidepart":
      X.fillStyle=base; X.fillRect(cx-3,t-2,6,3);
      X.fillStyle=lo; X.fillRect(cx-3,t,6,1);
      S(cx-1,t-2,cx-1,t+0.5,lo,0.3); S(cx-2,t-1.5,cx+2,t-2.2,hi,0.3);
      X.fillStyle=hi; X.fillRect(cx-2,t-2,1,1);
      break;
  }
  X.lineWidth=1; X.lineCap="butt";
}
function drawCustomer(c){
  const cast=CAST[c.type];
  let yoff=0;
  const cheering = cheer>0 && (c.state==="ordering"||c.state==="waiting"||c.state==="badorder");
  if(cheering){ yoff = -Math.abs(Math.sin(cheer*14 + c.bob))*3; }
  const walking = c.state==="entering" || c.state==="leaving";   // procedural patrons have no dir sprites
  const wstep = Math.floor(performance.now()/150)%2;             // gait phase 0/1
  if(walking && !cheering) yoff -= wstep;                        // body bobs on the up-beat
  const bx=c.x, by=c.y+yoff;
  X.fillStyle="rgba(0,0,0,.3)"; X.fillRect(bx-4,c.y,8,2);
  const spr=custSprite(c);
  if(spr && artReady(spr)){                                   // pixellab patron sprite
    if(c.angry && Math.floor(performance.now()/90)%2) blitBottom(tinted(spr,"cust"+c.type+c.dir+custFrame(c),"#c8452e"), bx, by, CUST_SPR_SCALE);
    else blitBottom(spr, bx, by, CUST_SPR_SCALE);
  } else {
    // shuffling feet on the ground line, so leaving patrons walk instead of moonwalking out
    X.fillStyle = c.angry ? "#5a2828" : "#241a2e";
    if(walking){ X.fillRect(bx-3, c.y-1-(wstep?1:0), 3,2); X.fillRect(bx+1, c.y-1-(wstep?0:1), 3,2); }
    else       { X.fillRect(bx-3, c.y-1, 3,2); X.fillRect(bx+1, c.y-1, 3,2); }
    // body (procedural fallback until the sprite loads)
    X.fillStyle=c.angry?"#8a3b3b":cast.outfit; X.fillRect(bx-4,by-8,8,8);
    // head
    X.fillStyle=cast.skin; X.fillRect(bx-3,by-13,6,6);
    // hair — the expressive part: per-character 24-bit hairdo
    drawHair(cast,bx,by);
    if(cast.acc==="cap"){ X.fillStyle="#2a3a4a"; X.fillRect(bx-3,by-14,6,2); X.fillRect(bx-4,by-13,3,1);
      X.fillStyle="#3f556a"; X.fillRect(bx-2,by-14,3,1); }
    if(cast.acc==="shades"){ X.fillStyle="#141018"; X.fillRect(bx-3,by-11,6,2); }
    if(cast.acc==="monocle"){ X.fillStyle="#e9d8b8"; X.fillRect(bx+1,by-11,2,2); }
    if(cast.acc==="bowtie"){ X.fillStyle="#c8452e"; X.fillRect(bx-1,by-7,2,2); }
    if(cast.acc==="notepad"){ X.fillStyle="#e9d8b8"; X.fillRect(bx+3,by-6,3,4); }
  }
  // clap sparks while cheering
  if(cheering){ const on=Math.floor(cheer*10)%2; if(on){ X.fillStyle="#ffe89a";
    X.fillRect(bx-6,by-16,1,1); X.fillRect(bx+5,by-16,1,1); X.fillRect(bx-7,by-14,1,1); X.fillRect(bx+6,by-14,1,1); } }
  // while deciding: hold up an open menu
  if(c.state==="ordering"){
    const mx=bx, my=by-10;
    X.fillStyle="#2a2030"; X.fillRect(mx-6,my-1,12,8);            // covers/shadow
    X.fillStyle="#e9dcc0"; X.fillRect(mx-5,my,5,7); X.fillRect(mx+1,my,5,7);  // two pages
    X.fillStyle="#c2b48f"; X.fillRect(mx,my,1,7);                 // center fold
    X.fillStyle="#8a7a5a";                                        // menu item lines
    X.fillRect(mx-4,my+1,3,1); X.fillRect(mx-4,my+3,3,1); X.fillRect(mx-4,my+5,2,1);
    X.fillRect(mx+2,my+1,3,1); X.fillRect(mx+2,my+3,3,1); X.fillRect(mx+2,my+5,2,1);

/* ---- kitchen idles: the room breathes even when nobody's cooking ---- */
// How hard a burner is going: 0 = cold. A wrecked station is cold; an idle one never is.
function idleAmt(st){
  if(st.broken) return 0;
  if(st.id==="pot")   return st.state==="idle" ? 0.32 : (st.state==="burnt" ? 0.5 : 1);
  if(st.id==="fryer") return st.state==="idle" ? 0.4  : 1;
  return 0;
}
// rising wisps. amt 0..1 = how hard it's going (a pot off the boil still steams a little)
function drawSteam(x,y,amt){
  if(amt<=0) return;
  const t=performance.now();
  for(let i=0;i<3;i++){
    const ph=((t/900)+i*0.37)%1;                   // 0..1 = rise + fade
    const a=(1-ph)*amt*0.5;
    if(a<0.03) continue;
    const w=1+Math.round(ph*2);                    // wisps spread as they climb
    const sx=Math.sin(ph*5.5+i*2)*2.2;             // and drift
    X.fillStyle="rgba(226,236,240,"+a.toFixed(3)+")";
    X.fillRect(Math.round(x+sx-w/2), Math.round(y-ph*11), w, 1);
  }
}
// heat haze over hot oil — warm bands wobbling upward
function drawHeatShimmer(x,y,amt){
  if(amt<=0) return;
  const t=performance.now();
  for(let i=0;i<3;i++){
    const ph=((t/700)+i*0.33)%1;
    const a=(1-ph)*amt*0.3;
    if(a<0.03) continue;
    const w=Math.round(6+Math.sin(t/200+i*1.7)*2);
    X.fillStyle="rgba(255,214,150,"+a.toFixed(3)+")";
    X.fillRect(Math.round(x-w/2), Math.round(y-ph*8), w, 1);
  }
}
// stack of clean plates. Knocked by use (see nudgePlates); top plates sway most.
function drawPlates(){
  const sway = plateWob>0 ? Math.sin(performance.now()/38)*plateWob*1.4 : 0;
  for(let i=0;i<PLATES.n;i++){
    const dx = sway*(i/(PLATES.n-1));              // bottom plate stays put, top one rocks
    const px = Math.round(PLATES.x-5+dx), py = PLATES.y-2-i*2;

}

function drawCandle(x,y,ph){

  for(const [bw,dy,aa] of bands){
    X.fillStyle="rgba(255,192,112,"+(aa*(0.82+f*0.36)).toFixed(3)+")";
    X.fillRect(Math.round(x+1-bw/2), y+dy, bw, 2);

  X.fillStyle="#ffb43c"; X.fillRect(x,y-3-h,2,h);                       // flame

    const gx=ODOOR.x+14, gy=ODOOR.y+13, dx=gx-o.x, dy=gy-o.y, d=Math.hypot(dx,dy);

function star(cx,cy,r){ X.beginPath();
  for(let i=0;i<10;i++){ const a=-Math.PI/2+i*Math.PI/5, rr=i%2?r*0.45:r;
    const px=cx+Math.cos(a)*rr, py=cy+Math.sin(a)*rr; i?X.lineTo(px,py):X.moveTo(px,py); }
  X.closePath(); X.fill(); }
function dayScore(){ return Math.max(1,Math.min(10, 6 + served*0.12 + shooed*0.05 - lost*0.15 + beliAdj)); } // today's live rating
function reputation(){   // the persistent rating = rolling average of recent days (falls back to today before any history)
  if(run && run.beliHist && run.beliHist.length){ let s=0; for(const v of run.beliHist) s+=v; return Math.max(1,Math.min(10, s/run.beliHist.length)); }
  return dayScore();
}
function beli(){ return reputation(); }   // reputation IS the rating everything reads (floor 1: low ratings bite)
// who witnessed a fight -> how hard it swings reputation (critics-recording worst, nobody negligible)
function witnessOf(specs, live){
  specs = specs || [];
  const filming = specs.filter(s=>s.filming!==false);
  const isCritic = s => CAST[s.type] && CAST[s.type].id==="critic";
  let tier, label;
  if(filming.some(isCritic)){ tier=WIT_CRITIC_REC; label="CRITIC ON CAMERA"; }
  else if(filming.length){ tier=WIT_PATRON_REC; label="IT'S ALL ON VIDEO"; }
  else if(specs.some(s=>isCritic(s) && s.filming===false)){ tier=WIT_CRITIC_WATCH; label="A CRITIC SAW IT"; }
  else { tier=WIT_NONE; label=""; }
  const cams = 1 + Math.min(1.2, filming.length*0.12) + (live?0.4:0);   // packed house / GOING LIVE = more exposure
  return { tier, cams, filming:filming.length, label };
}

   PORTABLE CODE for backup / moving between devices (localStorage dies if the app's data is cleared).
   Only the persistent economy is saved — coins, the calendar, and owned upgrades — never mid-day state:
   saving is a DAY BOUNDARY, not a mid-service snapshot. Versioned + checksummed, because builds get
   pushed and updated, so a save from an OLD build must load into a NEW one or be rejected cleanly (a

    const t=performance.now()/1000, sh=Math.max(1,Math.round(WARP_STRIP*SS)), k=warpAmpPx()*SS;
    for(let y=0,i=0; y<h; y+=sh,i++){
      const hh=Math.min(sh,h-y), off=warpOffset(i,t)*SS;
      X.drawImage(WARP_CV, 0,y,w,hh, off-k, y, w+2*k, hh);   // k of overdraw each side = no edge gap
    }
    X.imageSmoothingEnabled=sm;
  }catch(e){ /* no offscreen canvas here: skip the warp, never take the game down with it */ }
  X.setTransform(SS,0,0,SS,0,0);
}
function drawPlant(p){
  const cv=genPlant(p.seed); if(!cv) return;
  const w=cv.width, h=cv.height;
  if(p.broken){                                   // wreckage: a cracked pot and a bit of spill
    const pal=PLANT_PAL[ENV]||PLANT_PAL[0];
    X.fillStyle="rgba(0,0,0,.30)"; X.fillRect(p.x-6, p.y-1, 12, 2);
    X.fillStyle=pal.pot||pal.leaf[0];
    X.fillRect(p.x-5, p.y-3, 4, 3); X.fillRect(p.x+2, p.y-2, 3, 2); X.fillRect(p.x-1, p.y-2, 2, 2);
    X.fillStyle=pal.leaf[1];
    X.fillRect(p.x-3, p.y-4, 2, 1); X.fillRect(p.x+3, p.y-4, 2, 1); X.fillRect(p.x, p.y-5, 2, 1);
    return;
  }
  X.fillStyle="rgba(0,0,0,.30)"; X.fillRect(p.x-5, p.y-1, 10, 2);          // contact shadow
  // gentle sway, per-plant phase. Rotating about the BASE so the pot stays planted.
  const sw=Math.sin(performance.now()/900 + p.seed)*0.03;
  const sm=X.imageSmoothingEnabled; X.imageSmoothingEnabled=false;
  X.save(); X.translate(p.x, p.y); X.rotate(sw); X.drawImage(cv, -w/2, -h); X.restore();
  X.imageSmoothingEnabled=sm;
}

/* =========================== BRANDON (day boss) =========================== */
const BOSS_CHEF_HP=16, BOSS_BLEED=0.14;          // your health + the slow bleed from his entry shot
const BOSS_FIRE_INTERVAL=3.0, BOSS_MAG=6, BOSS_RELOAD=3.4;   // fires every 3s; reloads after 6 shots
const CROSS_SPEED=70, CROSS_R=16;                // crosshair chases you fast (chef out-runs it only just)
const BOSS_SHOT_DMG=3, BOSS_MED_BILL=400;        // each shot that lands: HP + a medical bill (always paid)
const BOSS_REACH=22, BOSS_KO_CHANCE=0.08;        // strike reach (reload window) + the small instant-KO chance
const PISTOL_WHIP_R=24, PISTOL_WHIP_DMG=BOSS_CHEF_HP*0.5;    // get close while he's firing -> whipped across the room, -50%
const BOSS_SPEED=90, BOSS_LOSS_BASE=1.6, BOSS_WIN_BASE=0.6;

function startBoss(){
  if(!run || (phase!=="play"&&phase!=="boss")) return;
  phase="boss";
  boss={ hp:20, maxHP:20, chefHP:BOSS_CHEF_HP, x:262, y:78, size:1, state:"draw", t:0.35,
    fireT:BOSS_FIRE_INTERVAL, shots:0, reloadT:0, cross:{x:chef.x,y:chef.y,active:false},
    medicalOwed:0, hurtFlash:0, outcome:null, endT:0, spectators:[], live:false };
  for(const c of customers){                     // seated diners whip out phones (cameras make it worse)
    if(c.state==="eating"||c.state==="waiting"||c.state==="ordering"||c.state==="badorder"){
      const isC=CAST[c.type].id==="critic";
      if(isC || Math.random()<SPECTATE_CHANCE)
        boss.spectators.push({x:c.x,y:c.y,type:c.type,bob:Math.random()*6,live:false,blink:Math.random(),filming:isC?(Math.random()<0.7):true});
    }
  }
  customers=[]; chef.carry=null; chef.x=120; chef.y=120; chef.dir="up";
  flash(W/2,48,"BRANDON","#c8452e"); flash(W/2,62,"you don't have his order.","#e88a7a"); sfx("burnt"); addShake(3.4);
}
function bossCams(){ return boss.spectators.filter(s=>s.filming!==false).length; }
function bossFireInterval(){ return BOSS_FIRE_INTERVAL / (1 + Math.min(1.0, bossCams()*0.1)); }  // more phones = faster
function moveChefBoss(dt){
  let vx=joy.vx, vy=joy.vy;
  if(vx||vy){ chef.x=Math.max(FLOOR.x0,Math.min(FLOOR.x1,chef.x+vx*BOSS_SPEED*dt));
    chef.y=Math.max(FLOOR.y0,Math.min(FLOOR.y1,chef.y+vy*BOSS_SPEED*dt));
    chef.moving=true; chef.dir=Math.abs(vx)>Math.abs(vy)?(vx>0?"right":"left"):(vy>0?"down":"up"); }
  else chef.moving=false;
}
function bossStrike(){                            // only lands in the reload window
  const B=boss; if(!B || B.state!=="reload" || B.outcome) return;
  if(Math.hypot(chef.x-B.x, chef.y-B.y) < BOSS_REACH){
    const bs = B.x<chef.x ? -1 : 1;
    if(Math.random()<BOSS_KO_CHANCE){ B.hp=0; flash(B.x,B.y-26,"KNOCKED OUT!","#ffd86b");
      sfxHit(impact(HIT.jab+HIT_KO, bs, 0, B.x, B.y-12), 0); sfx("ko"); bossWin(true); return; }
    // was sfx("perfect") — the PERFECT DISH arpeggio, for punching a man holding a gun
    B.hp=Math.max(0,B.hp-1); B.hurtFlash=0.2; flash(B.x,B.y-22,"-1","#ffd86b");
    sfxHit(impact(HIT.jab, bs, 0, B.x, B.y-12), 0);
    burst(B.x,B.y-10,6,["#ffd86b","#f7f3ea"],{sp:34,up:10,life:0.4});
    if(B.hp<=0) bossWin(false);
  }
}
function bossWin(ko){ if(boss.outcome) return; boss.outcome=ko?"ko":"win"; boss.endT=1.6;
  flash(W/2,54, ko?"BRANDON DROPS":"YOU BEAT BRANDON","#8be27a"); sfx("perfect"); cheer=1.2; }
function bossLose(){ if(boss.outcome) return; boss.outcome="lose"; boss.endT=2.0; boss.chefHP=0;
  flash(W/2,54,"SHOT DOWN","#c8452e"); sfx("burnt"); addShake(4); }
function pistolWhip(){                            // get close while he's firing -> smacked across the room, -50%
  const B=boss; if(B.outcome) return;
  B.chefHP-=PISTOL_WHIP_DMG; B.hurtFlash=0.6;
  chef.x = (B.x < W/2) ? FLOOR.x1-12 : FLOOR.x0+12;   // flung to the far side, away from Brandon
  chef.y = (B.y < H/2) ? FLOOR.y1-12 : FLOOR.y0+12;
  joy.vx=0; joy.vy=0;
  // was a raw shake of 5.0: over the old 4.5 cap, so raising SHAKE_MAX would have made it louder by
  // accident. On the spine it is exactly a STUMBLE — which is what it is.
  flash(chef.x,chef.y-16,"PISTOL WHIPPED!","#c8452e"); sfx("hurt");
  impact(HIT.stumble, (B.x<chef.x?1:-1), 0, chef.x, chef.y-12);
  burst(chef.x,chef.y-10,10,["#c8452e","#f7f3ea"],{sp:44,up:12,life:0.5});

function endBoss(){
  const B=boss, a=witnessOf(B.spectators,B.live);
  if(run){ run.bank=Math.max(0, run.bank - B.medicalOwed); }   // medical bills always paid
  if(B.outcome==="lose"){
    const hit=Math.round(BOSS_LOSS_BASE*a.tier*a.cams*10)/10; beliAdj-=hit;   // shot down on camera = brutal
    boss=null; finishDay();                                    // hospitalized -> the day's over
  } else {
    const boon=Math.round(BOSS_WIN_BASE*a.tier*a.cams*10)/10; beliAdj+=boon;  // beating him on camera = PR
    boss=null; phase="play";                                   // shaken, back to service
    flash(W/2,40,"back to service","#e9d8b8");
  }
}
function updateBoss(dt){
  const B=boss; if(!B) return;
  if(B.hurtFlash>0) B.hurtFlash-=dt;
  for(const f of flashes){ f.t-=dt; f.y-=14*dt; } flashes=flashes.filter(f=>f.t>0);
  updateParticles(dt); if(shake>0) shake=Math.max(0, shake-dt*SHAKE_DECAY);
  if(B.outcome){ B.endT-=dt; if(B.endT<=0) endBoss(); return; }
  B.size = 1 + Math.min(0.8, bossCams()*0.12);                 // cameras -> bigger
  moveChefBoss(dt);
  B.chefHP -= BOSS_BLEED*dt;                                   // the entry shot: you're bleeding the whole time
  // get too close while he can shoot -> PISTOL WHIP
  if((B.state==="firing") && Math.hypot(chef.x-B.x,chef.y-B.y)<PISTOL_WHIP_R){ pistolWhip(); if(B.outcome) return; }
  if(B.state==="draw"){ B.t-=dt; if(B.t<=0){                   // he draws and INSTANTLY fires — first shot always lands
      B.chefHP-=BOSS_SHOT_DMG; B.medicalOwed+=BOSS_MED_BILL; B.hurtFlash=0.5;
      flash(chef.x,chef.y-16,"HIT!  \u2212$"+BOSS_MED_BILL,"#c8452e");
      impact(HIT.hurt, (B.x<chef.x?1:-1), 0, chef.x, chef.y-12); sfx("hurt");   // was sfx("burnt") — burnt food, for a gunshot
      B.shots=1; B.state="firing"; B.fireT=bossFireInterval(); B.cross.x=chef.x+20; B.cross.y=chef.y; B.cross.active=true;
    } }
  else if(B.state==="firing"){
    const dx=chef.x-B.cross.x, dy=chef.y-B.cross.y, d=Math.hypot(dx,dy)||1;   // crosshair drifts onto you
    B.cross.x+=dx/d*CROSS_SPEED*dt; B.cross.y+=dy/d*CROSS_SPEED*dt;
    B.fireT-=dt;
    if(B.fireT<=0){
      if(Math.hypot(chef.x-B.cross.x, chef.y-B.cross.y) < CROSS_R){
        B.chefHP-=BOSS_SHOT_DMG; B.medicalOwed+=BOSS_MED_BILL; B.hurtFlash=0.5;
        flash(chef.x,chef.y-16,"HIT!  \u2212$"+BOSS_MED_BILL,"#c8452e");
      impact(HIT.hurt, (B.x<chef.x?1:-1), 0, chef.x, chef.y-12); sfx("hurt");   // was sfx("burnt") — burnt food, for a gunshot
      } else { flash(B.cross.x,B.cross.y-6,"MISS","#8be27a"); sfx("serve"); }
      B.shots++;
      if(B.shots % BOSS_MAG === 0){ B.state="reload"; B.reloadT=BOSS_RELOAD; B.cross.active=false; flash(B.x,B.y-24,"RELOADING \u2014 GET HIM!","#ffd86b"); }
      else B.fireT=bossFireInterval();
    }
  } else if(B.state==="reload"){
    B.reloadT-=dt;
    if(B.reloadT<=0){ B.state="firing"; B.fireT=bossFireInterval(); B.cross.x=chef.x+30; B.cross.y=chef.y; B.cross.active=true; }
  }
  if(B.chefHP<=0 && !B.outcome) bossLose();
}

/* ================= loop ================= */
let last=performance.now();
function loop(now){
  const dt=Math.min((now-last)/1000,0.05); last=now;
  // HITSTOP: the held frame. Freezing the sim (not the render) is the single biggest impact
  // primitive in the genre, and the pause path below already proved the architecture: freeze
  // update(), keep drawing. The kick decays with the sim so it holds through the freeze too.
  pollPad();                                    // before the hitstop gate: update() is skipped while
                                                // frozen, and a press eaten there is a press you made
  const cine = (phase==="brawl" && brawl.cine) ? brawl.cine : null;   // #20: the GOING-LIVE cinematic freezes the sim, like hitstop/pause
  if(!paused && !cine && !tickHitstop(dt)){ update(dt); tickKick(dt); }
  if(cine){ cine.t+=dt; if(cine.t>=CINE_TOTAL) brawl.cine=null; }      // ...but the camera advances on REAL time while the sim is frozen
  // world (with shake + directional kick + punch-zoom)
  const sx = Math.round((shake>0 ? (Math.random()*2-1)*shake : 0) + kick.x);
  const sy = Math.round((shake>0 ? (Math.random()*2-1)*shake : 0) + kick.y);
  // Zoom off the SMOOTH magnitudes, not sx/sy: those are re-randomised every frame, so zooming on
  // them would strobe the room 60x a second instead of punching in and settling. |sx| can never
  // exceed shake+|kick.x| (+1 for the rounding), so this still covers the offset — smoothly.
  // Zoom + pan live in camMatrix() so they're testable — the loop can't be. Outside a brawl camLean*
  // sit at centre, so this is exactly the old expression: cam=W/2 => sx+W/2-z*W/2 == sx-(z-1)*W/2.
  let M;
  if(cine){ const f=cineFocus(cine.t, cine.fx, cine.fy); M=camMatrix(0,0,0, f.x, f.y, 0, 0, cineZoomAt(cine.t)); }  // #20: focal zoom on the streamer, shake forced to 0
  else M=camMatrix(shake, kick.x, kick.y, camLeanX, camLeanY, sx, sy);
  const z = M.a;
  X.setTransform(SS,0,0,SS,0,0);
  X.clearRect(-8,-8,W+16,H+16);
  X.setTransform(SS*M.a,0,0,SS*M.a, M.e*SS, M.f*SS);   // zoom about the camera, then offset
  if(phase==="brawl"){ drawWorldBase(); drawBrawl(); }
  else if(phase==="night"){ drawWorldBase(); drawNight(); }
  else if(phase==="boss"){ drawBoss(); }
  else if(phase==="office"){ /* office draws its own full screen below */ }
  else if(phase==="gameover"){ /* eviction screen below */ }
  else draw();
  // drunk vision: warps the WORLD only, and only while wasted. Must land after the world and before
  // the HUD — she has to be able to read her own health while the room is swimming.
  if(phase==="brawl") drawDrunkWarp();
  // UI + overlays (steady)
  X.setTransform(SS,0,0,SS,0,0);
  if(phase==="brawl") drawBrawlHUD();
  else if(phase==="night") drawNightHUD();
  else if(phase==="boss") drawBossHUD();
  else if(phase==="office"){ /* no game HUD in the office */ }
  else if(phase==="gameover"){ /* no game HUD */ }
  else drawUI();
  if(phase==="title") drawTitle();
  else if(phase==="over") drawEnd();
  else if(phase==="office") drawOffice();
  else if(phase==="gameover") drawGameOver();
  if(canPause()){ drawPauseButton(); if(paused) drawPausedOverlay(); }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
