<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#0b0810" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🍳</text></svg>" />
  <title>Culinary Dash 3D</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; background: #0b0810; overflow: hidden; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    #hud {
      position: fixed; top: 8px; left: 0; right: 0;
      text-align: center; pointer-events: none;
      font: 600 13px/1.3 system-ui, sans-serif; color: #ffe9c7;
      text-shadow: 0 1px 2px #000; letter-spacing: .02em;
    }
    #hint {
      position: fixed; bottom: 8px; left: 0; right: 0;
      text-align: center; pointer-events: none;
      font: 500 11px/1.3 system-ui, sans-serif; color: #9a8c78;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud"></div>
  <div id="hint">WASD / arrows / left-stick to move &middot; E or A-button to interact</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
