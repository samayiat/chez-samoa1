<!doctype html><meta charset=utf-8><title>PixelLab test sprite</title>
<style>
  body{margin:0;background:#1a1622;color:#e8e0d0;font:14px monospace;text-align:center}
  h1{font-size:15px;font-weight:normal;color:#f0c674;margin:18px 0 4px}
  p{color:#8a8; margin:0 0 18px}

<h1>PixelLab.ai — end-to-end test sprite (zz_apitest)</h1>
<p>"a friendly robot waiter holding a serving tray" · 64×64 · low top-down · 4 directions</p>
<div class=row>
  <figure><img src="south.png" alt=south><figcaption>south</figcaption></figure>
  <figure><img src="west.png"  alt=west><figcaption>west</figcaption></figure>
  <figure><img src="east.png"  alt=east><figcaption>east</figcaption></figure>
  <figure><img src="north.png" alt=north><figcaption>north</figcaption></figure>
