name: Deploy Culinary Dash to GitHub Pages

on:
  push:
    branches: [main, claude/3d-js-browser-game-bq0v5l]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare site
        run: |
          mkdir site
          cp culinary-dash/culinary-dash-devtools.html site/index.html
          cp culinary-dash/site-assets/manifest.json site/manifest.json
          cp culinary-dash/site-assets/icon-192.png site/icon-192.png
          cp culinary-dash/site-assets/icon-512.png site/icon-512.png
          cp culinary-dash/site-assets/apple-touch-icon.png site/apple-touch-icon.png
          cp culinary-dash/site-assets/favicon-32.png site/favicon-32.png
          # 3D game (self-contained single-file build) served at /3d/
          mkdir -p site/3d
          cp culinary-dash-3d/play/index.html site/3d/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
