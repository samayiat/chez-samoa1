name: Deploy Culinary Dash to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build the 3D Vince preview (self-contained single file)
        run: |
          cd culinary-dash-3d
          npm ci
          npx vite build --config vite.vince.config.js
      - name: Prepare site
        run: |
          mkdir site
          # Ship the DEV=false build. culinary-dash-devtools.html is DEV=true and
          # exposes the pause dev menu (wave/enemy overrides, START BRAWL) — never public.
          cp culinary-dash/culinary-dash.html site/index.html
          cp culinary-dash/site-assets/manifest.json site/manifest.json
          cp culinary-dash/site-assets/icon-192.png site/icon-192.png
          cp culinary-dash/site-assets/icon-512.png site/icon-512.png
          cp culinary-dash/site-assets/apple-touch-icon.png site/apple-touch-icon.png
          cp culinary-dash/site-assets/favicon-32.png site/favicon-32.png
          # 3D game (self-contained single-file build) served at /3d/
          mkdir -p site/3d
          cp culinary-dash-3d/play/index.html site/3d/index.html
          # 3D "Eviction Night" Vince boss-fight preview at /vince/
          mkdir -p site/vince
          cp culinary-dash-3d/dist-vince/vince.html site/vince/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
